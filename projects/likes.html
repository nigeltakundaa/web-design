<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Like Button</title>
</head>
<body>

<h2>👍 Likes: <span id="likeCount">0</span></h2>

<center><button onclick="addLike()">Like</button></center>

<script>
    let likes = 0;

    function addLike() {
        likes++;
        document.getElementById("likeCount").textContent = likes;
    }
</script>

</body>
</html>
