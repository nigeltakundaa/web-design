<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    

    <script>

var promptVal = prompt("Please enter a number");

if (promptVal > 0){
    document.write("The number is positive");
}
else if(promptVal == 0 )
document.write("The number you entered was zero");
else
document.write("The number you entered was negative");
    </script>
</body>
